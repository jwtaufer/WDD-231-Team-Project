<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link rel="stylesheet" href="./styles/todo.css">
    <script src="./scripts/global.js" defer></script>
</head>
<body>
    <header>
        <div class="header">
            <a href="./index.html" id="logo-link">
                <div id="site-logo">
                    <div class="T">T</div>
                    <div class="o">o</div>
                    <div class="D">D</div>
                    <div class="oo">o</div>
                </div>
            </a>
            <nav class="hamburger-button">
                <span></span>
                <span></span>
                <span></span>
            </nav>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a class="active" href="./index.html">To Do List</a></li>
                <li><a href="./goals.html">Goals</a></li>
                <li><a href="./about.html">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="top-bar">
            <button>Add Item</button>
            <form class="switch">
                <label for="toggle">Grid</label>
                <input id="toggle" type="checkbox" checked>
                <span class="slider"></span>
            </form>
        </section>
        <h3 class="qlabel horizontal" id="urgent">Urgent</h3>
        <h3 class="qlabel horizontal" id="not-urgent">Not Urgent</h3>
        <h3 class="qlabel vertical" id="important">Important</h3>
        <section class="list-card" id="quadrant1">
            <form>
                <ul>
                    <li>
                        <input type="checkbox">
                        <label>Homework</label>
                        <input type="date" value="2026-04-08">
                        <select>
                            <option value="goal1">Finish Semester</option>
                        </select>
                    </li>
                </ul>
            </form>
        </section>
        <section class="list-card" id="quadrant2">
            <form></form>
        </section>
        <h3 class="qlabel vertical" id="not-important">Not Important</h3>
        <section class="list-card" id="quadrant3">
            <form></form>
        </section>
        <section class="list-card" id="quadrant4">
            <form></form>
        </section>
    </main>
    <footer>
        <ul>
            <li><a href="./about.html">About</a></li>
            <li><a href="./index.html">To Do List</a></li>
            <li><a href="./goals.html">Goals</a></li>
        </ul>
        <p>&#169; 2026. Jacob Taufer & Jacob Sanchez - WDD 231</p>
    </footer>
</body>
</html>
